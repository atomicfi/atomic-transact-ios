name: "Create Release"
on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: "Make Release"
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Compress Archives
        run: |
          tar -czf AtomicTransact.xcframework.tar.gz artifacts/AtomicTransact.xcframework
          tar -czf AtomicTransact-Dynamic.xcframework.tar.gz artifacts/AtomicTransact-Dynamic.xcframework
          tar -czf Uplink.xcframework.tar.gz artifacts/Uplink.xcframework
          tar -czf Uplink-Dynamic.xcframework.tar.gz artifacts/Uplink-Dynamic.xcframework
          tar -czf MuppetIOS.xcframework.tar.gz artifacts/MuppetIOS.xcframework
          tar -czf MuppetIOS-Dynamic.xcframework.tar.gz artifacts/MuppetIOS-Dynamic.xcframework
      - name: Create Release
        uses: mikepenz/action-gh-release@2a00e201320fb618d8e705a736286b2e31aa48e2
        with:
          body_path: ${{ github.workspace }}/.github/releases/release-body.txt
          files: |
            AtomicTransact.xcframework.tar.gz
            AtomicTransact-Dynamic.xcframework.tar.gz
            Uplink.xcframework.tar.gz
            Uplink-Dynamic.xcframework.tar.gz
            MuppetIOS.xcframework.tar.gz
            MuppetIOS-Dynamic.xcframework.tar.gz
